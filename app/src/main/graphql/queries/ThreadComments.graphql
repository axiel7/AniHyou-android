query ThreadComments($page: Int, $perPage: Int, $threadId: Int) {
  Page(page: $page, perPage: $perPage) {
    threadComments(threadId: $threadId) {
      ...BasicComment
    }
    pageInfo {
      currentPage
      hasNextPage
    }
  }
}

fragment BasicComment on ThreadComment {
  id
  comment
  likeCount
  createdAt
  user {
    id
    name
    avatar {
      medium
    }
  }
}
