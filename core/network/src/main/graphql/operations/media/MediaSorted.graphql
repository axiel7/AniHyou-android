query MediaSorted($page: Int, $perPage: Int, $type: MediaType, $sort: [MediaSort], $isAdult: Boolean) {
    Page(page: $page, perPage: $perPage) {
        media(type: $type, sort: $sort, isAdult: $isAdult) {
            ...BasicMediaDetails
            coverImage {
                large
            }
            meanScore
            bannerImage
            format
            seasonYear
            averageScore
            genres
            mediaListEntry {
                ...BasicMediaListEntry
            }
        }
        pageInfo {
            ...CommonPage
        }
    }
}
