query UserMediaList($page: Int, $perPage: Int, $userId: Int, $type: MediaType, $statusIn: [MediaListStatus], $sort: [MediaListSort], $scoreFormat: ScoreFormat) {
    Page(page: $page, perPage: $perPage) {
        mediaList(userId: $userId, type: $type, status_in: $statusIn, sort: $sort) {
            ...CommonMediaListEntry
            scoreFixed: score(format: $scoreFormat)
        }
        pageInfo {
            ...CommonPage
        }
    }
}