query SeasonalAnime($page: Int, $perPage: Int, $season: MediaSeason, $seasonYear: Int, $sort: [MediaSort], $isAdult: Boolean) {
    Page(page: $page, perPage: $perPage) {
        media(season: $season, seasonYear: $seasonYear, sort: $sort, isAdult: $isAdult) {
            ...BasicMediaDetails
            coverImage {
                large
            }
            meanScore
            nextAiringEpisode {
                episode
                timeUntilAiring
            }
            genres
            bannerImage
            format
            seasonYear
            averageScore
            mediaListEntry {
                ...BasicMediaListEntry
            }
        }
        pageInfo {
            ...CommonPage
        }
    }
}
