name: Build APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: adopt

      - name: Check string resources
        run: bash scripts/check_string_refs.sh

      - name: Build FOSS debug APK
        run: ./gradlew assembleFossDebug

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: app-foss-debug
          path: app/build/outputs/apk/foss/debug/*.apk
