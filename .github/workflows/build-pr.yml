name: Build APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: adopt

      - name: Check string resources
        run: bash scripts/check_string_refs.sh

      - name: Run unit tests (app module only)
        run: ./gradlew :app:testFossDebugUnitTest

      - name: Build FOSS debug APK
        run: ./gradlew assembleFossDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-foss-debug
          path: app/build/outputs/apk/foss/debug/*.apk

      - name: Append SUCCESS to build log
        if: success()
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          VERSION=$(grep '^name' version.properties | cut -d= -f2 | tr -d ' ')
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          echo "[${DATE}] SUCCESS | commit:${COMMIT} | version:${VERSION} | assembleFossDebug + unit tests GREEN" >> builds/logs.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add builds/logs.txt
          git diff --cached --quiet || git commit -m "ci: log SUCCESS build at ${COMMIT}"
          git push

      - name: Append FAILURE to build log
        if: failure()
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          VERSION=$(grep '^name' version.properties | cut -d= -f2 | tr -d ' ')
          DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          echo "[${DATE}] FAILURE | commit:${COMMIT} | version:${VERSION} | see workflow run for details" >> builds/logs.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add builds/logs.txt
          git diff --cached --quiet || git commit -m "ci: log FAILURE build at ${COMMIT}"
          git push
